name: DictateApp
options:
  bundleIdPrefix: com.gmalonso
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_HARDENED_RUNTIME: true
    ENABLE_DEBUG_DYLIB: false

targets:
  DictateApp:
    type: application
    platform: macOS
    sources:
      - path: DictateApp
        excludes:
          - "**/.DS_Store"
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gmalonso.whisper-dictate-mac
        CODE_SIGN_ENTITLEMENTS: DictateApp/DictateApp.entitlements
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
    info:
      path: DictateApp/Info.plist
      properties:
        CFBundleDevelopmentRegion: pt-BR
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSMicrophoneUsageDescription: "Precisamos acessar o microfone para transcrever sua voz"
