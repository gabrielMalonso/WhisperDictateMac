name: WhisperDictateMac
options:
  bundleIdPrefix: com.gmalonso
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_HARDENED_RUNTIME: true
    ENABLE_DEBUG_DYLIB: false

targets:
  WhisperDictateMac:
    type: application
    platform: macOS
    sources:
      - path: WhisperDictateMac
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gmalonso.whisper-dictate-mac
        CODE_SIGN_ENTITLEMENTS: WhisperDictateMac/WhisperDictateMac.entitlements
        CODE_SIGN_STYLE: Automatic
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
    info:
      path: WhisperDictateMac/Info.plist
      properties:
        CFBundleDevelopmentRegion: pt-BR
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSMicrophoneUsageDescription: "O app precisa acessar o microfone para transcrever sua voz localmente."

  WhisperDictateMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: WhisperDictateMacTests
    dependencies:
      - target: WhisperDictateMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gmalonso.whisper-dictate-mac.tests
        GENERATE_INFOPLIST_FILE: true
