name: DictateOSS
options:
  bundleIdPrefix: com.gmalonso
  developmentLanguage: pt-BR
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    SWIFT_EMIT_LOC_STRINGS: true
    ENABLE_HARDENED_RUNTIME: true
    ENABLE_DEBUG_DYLIB: false

targets:
  DictateOSS:
    type: application
    platform: macOS
    sources:
      - path: DictateOSS
        excludes:
          - "**/.DS_Store"
          - "Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gmalonso.dictate-oss
        CODE_SIGN_ENTITLEMENTS: DictateOSS/DictateOSS.entitlements
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_NAME: DictateOSS
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          DEVELOPMENT_TEAM: 387JVJ66Z3
    info:
      path: DictateOSS/Info.plist
      properties:
        CFBundleDevelopmentRegion: pt-BR
        CFBundleDisplayName: DictateOSS
        CFBundleName: DictateOSS
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        NSMicrophoneUsageDescription: "Precisamos acessar o microfone para transcrever sua voz"

  DictateOSSTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: DictateOSSTests
    dependencies:
      - target: DictateOSS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.gmalonso.dictate-oss.tests
        DEVELOPMENT_TEAM: 387JVJ66Z3
        GENERATE_INFOPLIST_FILE: true
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
