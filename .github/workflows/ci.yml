name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Build and test macOS app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Test DictateOSS
        run: |
          xcodebuild test \
            -project DictateOSS.xcodeproj \
            -scheme DictateOSS \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath "$RUNNER_TEMP/DictateOSSDerivedData" \
            CODE_SIGNING_ALLOWED=NO
